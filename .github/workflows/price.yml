name: Price Tracker

on:
  schedule:
    - cron: "0 */6 * * *"  # co 6 godzin
  workflow_dispatch:       # pozwala odpalić ręcznie

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Install deps
        run: pip install -r requirements.txt

      - name: Run tracker
        run: python tracker.py
